<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ops Gateway</title>
  <style>
    /* Fluent Design Styles */
    :root {
      /* Light theme by default */
      --page-bg: #f3f3f3;
      --card-bg: rgba(255, 255, 255, 0.7);
      --card-border: rgba(0, 0, 0, 0.05);
      --text-main: #202020;
      --text-secondary: #5d5d5d;
      --accent: #0067c0;
      --accent-hover: #005eb3;
      --ok-bg: #dff6dd;
      --ok-text: #107c10;
      --bad-bg: #fde7e9;
      --bad-text: #c50f1f;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
      --header-bg: rgba(255, 255, 255, 0.5);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --page-bg: #202020;
        --card-bg: rgba(45, 45, 45, 0.6);
        --card-border: rgba(255, 255, 255, 0.08);
        --text-main: #ffffff;
        --text-secondary: #cccccc;
        --accent: #4cc2ff;
        --accent-hover: #47b1e8;
        --ok-bg: rgba(16, 124, 16, 0.3);
        --ok-text: #60cd18;
        --bad-bg: rgba(197, 15, 31, 0.3);
        --bad-text: #ff99a4;
        --shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
        --header-bg: rgba(32, 32, 32, 0.5);
      }
    }

    /* For Fluent, Mica and Acrylic effect */
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI Variable Display", "Segoe UI Variable Text", "Segoe UI", system-ui, sans-serif;
      background-color: var(--page-bg);
      background-image: radial-gradient(circle at top left, rgba(0, 103, 192, 0.08), transparent 50%),
                        radial-gradient(circle at bottom right, rgba(76, 194, 255, 0.08), transparent 50%);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      transition: background-color 0.3s ease, color 0.3s ease;
      box-sizing: border-box;
    }

    * {
      box-sizing: border-box;
    }

    .shell {
      width: 100%;
      max-width: 1100px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .header-card {
      background: var(--header-bg);
      backdrop-filter: blur(30px) saturate(150%);
      -webkit-backdrop-filter: blur(30px) saturate(150%);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 28px;
      box-shadow: var(--shadow);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    .header-info h1 {
      margin: 0;
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .header-info p {
      margin: 6px 0 0;
      color: var(--text-secondary);
      font-size: 1rem;
    }

    .clock-container {
      text-align: right;
    }

    .time {
      font-size: 2rem;
      font-weight: 600;
      margin: 0;
      font-variant-numeric: tabular-nums;
    }

    .date {
      color: var(--text-secondary);
      margin: 4px 0 0;
      font-size: 0.95rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(20px) saturate(150%);
      -webkit-backdrop-filter: blur(20px) saturate(150%);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 20px;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease, border-color 0.2s ease;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      text-decoration: none;
      color: var(--text-main);
    }

    /* Subtle hover light effect (reveal) - basic simulation via pseudo element */
    .card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255,255,255,0.08), transparent 40%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 1;
    }

    @media (prefers-color-scheme: light) {
      .card::before {
         background: radial-gradient(600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255,255,255,0.5), transparent 40%);
      }
    }

    .card:hover::before {
      opacity: 1;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12);
      border-color: rgba(128, 128, 128, 0.3);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .card h2 {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 600;
    }

    .path {
      font-family: "Cascadia Code", "Consolas", monospace;
      color: var(--accent);
      font-size: 0.85rem;
      background: rgba(128, 128, 128, 0.1);
      padding: 3px 8px;
      border-radius: 4px;
      margin-top: 6px;
      display: inline-block;
    }

    .desc {
      margin: 0 0 20px;
      color: var(--text-secondary);
      font-size: 0.9rem;
      line-height: 1.4;
      flex-grow: 1;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
      z-index: 2;
    }

    .btn-group {
      display: flex;
      gap: 8px;
    }

    .btn {
      background: rgba(128, 128, 128, 0.1);
      border: 1px solid transparent;
      color: var(--text-main);
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s ease;
      display: inline-flex;
      align-items: center;
      font-family: inherit;
    }

    .btn:hover {
      background: rgba(128, 128, 128, 0.2);
    }

    .btn.primary {
      background: var(--accent);
      color: #fff;
    }

    .btn.primary:hover {
      background: var(--accent-hover);
    }

    .status {
      font-size: 0.8rem;
      padding: 4px 10px;
      border-radius: 12px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(128, 128, 128, 0.1);
      color: var(--text-secondary);
    }

    .status::before {
      content: "";
      display: block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
    }

    .ok {
      background: var(--ok-bg);
      color: var(--ok-text);
    }

    .bad {
      background: var(--bad-bg);
      color: var(--bad-text);
    }

    .foot {
      text-align: center;
      padding: 20px;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="header-card">
      <div class="header-info">
        <h1 id="greeting">Operations Gateway</h1>
        <p>Unified entry at <strong>:8080</strong>. Services exposed by sub-path.</p>
      </div>
      <div class="clock-container">
        <div class="time" id="time">--:--</div>
        <div class="date" id="date">--</div>
      </div>
    </header>

    <main class="grid" id="card-container">
      <!-- Services will be generated here -->
    </main>

    <footer class="foot">
      Tip: Keep this page as your default bookmark for service navigation.
    </footer>
  </div>

  <script>
    const services = [
      { id: 'mcs', name: 'MCSManager', path: '/mcs/', desc: 'Minecraft service management panel.' },
      { id: 'asf', name: 'ArchiSteamFarm', path: '/asf/', desc: 'ASF web interface and bot runtime.' },
      { id: 'aria2', name: 'AriaNg', path: '/aria2/', desc: 'Aria2 web UI through Caddy route.' },
      { id: 'syncthing', name: 'Syncthing', path: '/syncthing/', desc: 'Peer-to-peer file sync console behind Caddy.' },
      { id: 'jsonrpc', name: 'Aria2 RPC', path: '/jsonrpc', desc: 'API endpoint for download automation.' },
      { id: 'ha', name: 'Home Assistant', path: ':8123/', desc: 'Home automation dashboard (uv-managed runtime).', isAbsolute: true }
    ];

    const container = document.getElementById('card-container');
    const haUrl = `${location.protocol}//${location.hostname}:8123/`;

    // Render cards
    services.forEach(svc => {
      const isHa = svc.id === 'ha';
      const url = isHa ? haUrl : svc.path;
      const displayPath = isHa ? `${location.hostname}:8123/` : svc.path;
      const healthEndpoint = isHa ? null : svc.path;

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-header">
          <h2>${svc.name}</h2>
          <span class="status" id="status-${svc.id}">Checking...</span>
        </div>
        <div class="path">${displayPath}</div>
        <div class="desc">${svc.desc}</div>
        <div class="row">
          <div class="btn-group">
            <a href="${url}" class="btn primary" ${isHa ? 'target="_blank" rel="noopener"' : ''}>Open</a>
            <button class="btn copy-btn" data-url="${url}">Copy Link</button>
          </div>
        </div>
      `;
      
      // Reveal effect setup
      card.addEventListener('mousemove', e => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        card.style.setProperty('--mouse-x', `${x}px`);
        card.style.setProperty('--mouse-y', `${y}px`);
      });

      container.appendChild(card);

      // Copy link listener
      const copyBtn = card.querySelector('.copy-btn');
      copyBtn.addEventListener('click', (e) => {
        e.preventDefault();
        const fullUrl = new URL(url, window.location.href).href;
        navigator.clipboard.writeText(fullUrl).then(() => {
          const orig = copyBtn.textContent;
          copyBtn.textContent = 'Copied!';
          setTimeout(() => copyBtn.textContent = orig, 2000);
        });
      });

      // Start health probe
      if (healthEndpoint) {
        probeStatus(healthEndpoint, svc.id);
        // Set up interval for continuous probing every 15 seconds
        setInterval(() => probeStatus(healthEndpoint, svc.id), 15000);
      } else {
        const statusEl = document.getElementById(`status-${svc.id}`);
        statusEl.textContent = 'Manual';
        statusEl.className = 'status';
      }
    });

    async function probeStatus(url, id) {
      const target = document.getElementById(`status-${id}`);
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000); // 5s timeout
        
        const res = await fetch(url, { 
          method: "GET", 
          cache: "no-store",
          signal: controller.signal
        });
        clearTimeout(timeoutId);

        if ([200, 301, 302, 307, 308, 401, 403, 405].includes(res.status)) {
          target.textContent = "Online";
          target.className = "status ok";
        } else {
          target.textContent = "Err " + res.status;
          target.className = "status bad";
        }
      } catch (err) {
        target.textContent = "Offline";
        target.className = "status bad";
      }
    }

    // Update Clock and Greeting
    function updateTime() {
      const now = new Date();
      const hours = now.getHours();
      let greeting = "Good evening";
      if (hours >= 5 && hours < 12) greeting = "Good morning";
      else if (hours >= 12 && hours < 18) greeting = "Good afternoon";

      document.getElementById('greeting').textContent = greeting + ", Ops Gateway";
      
      const timeOpts = { hour: '2-digit', minute: '2-digit', hour12: false };
      document.getElementById('time').textContent = now.toLocaleTimeString(undefined, timeOpts);
      
      const dateOpts = { weekday: 'long', month: 'short', day: 'numeric' };
      document.getElementById('date').textContent = now.toLocaleDateString(undefined, dateOpts);
    }
    
    updateTime();
    setInterval(updateTime, 1000);
  </script>
</body>
</html>
