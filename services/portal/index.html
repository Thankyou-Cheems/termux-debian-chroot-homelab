<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NeoGateway</title>
  <!-- Modern Font: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --bg: #070709;
      --card-bg: rgba(22, 22, 26, 0.45);
      --card-border: rgba(255, 255, 255, 0.04);
      --card-border-hover: rgba(255, 255, 255, 0.12);

      --text-main: #ffffff;
      --text-muted: #8a8a93;

      --accent-glow: rgba(99, 102, 241, 0.15);
      /* Indigo glow */

      --status-ok: #10b981;
      /* Emerald */
      --status-bad: #ef4444;
      /* Red */
      --status-check: #f59e0b;
      /* Amber */

      --shadow-base: 0 8px 32px rgba(0, 0, 0, 0.4);
      --radius-lg: 24px;
      --radius-md: 16px;

      --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background-color: var(--bg);
      color: var(--text-main);
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(20px, 5vw, 60px);
      position: relative;
      overflow-x: hidden;
    }

    /* Ambient animated background meshes */
    .ambient-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.4;
      animation: float 20s infinite ease-in-out alternate;
    }

    .orb-1 {
      top: -10%;
      left: -10%;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.15), transparent 70%);
      animation-delay: 0s;
    }

    .orb-2 {
      bottom: -10%;
      right: -10%;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.12), transparent 70%);
      animation-delay: -5s;
    }

    @keyframes float {
      0% {
        transform: translate(0, 0) scale(1);
      }

      100% {
        transform: translate(5%, 5%) scale(1.1);
      }
    }

    /* Grain Overlay for texture */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.02'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
    }

    .bento-container {
      width: 100%;
      max-width: 1280px;
      display: grid;
      /* Asymmetric Bento Grid */
      grid-template-columns: repeat(12, 1fr);
      grid-auto-rows: minmax(180px, auto);
      gap: 20px;
      position: relative;
      z-index: 10;
    }

    .glass-panel {
      background: var(--card-bg);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-lg);
      padding: 32px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
      transition: var(--transition);
      box-shadow: var(--shadow-base);
    }

    /* Subdued inner glow mechanism on hover */
    .glass-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(800px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), var(--accent-glow), transparent 40%);
      opacity: 0;
      transition: opacity 0.5s ease;
      z-index: 0;
      pointer-events: none;
    }

    .glass-panel:hover::before {
      opacity: 1;
    }

    .glass-panel:hover {
      border-color: var(--card-border-hover);
      transform: translateY(-4px) scale(1.005);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
    }

    .glass-panel:active {
      transform: scale(0.98);
    }

    .glass-panel>* {
      position: relative;
      z-index: 2;
    }

    /* ==== Specific Bento Elements ==== */

    /* Hero/Clock (Spans 5 columns on desktop) */
    .hero {
      grid-column: span 5;
      grid-row: span 2;
      justify-content: flex-end;
      background: linear-gradient(160deg, rgba(30, 30, 35, 0.7), rgba(15, 15, 18, 0.4));
    }

    .hero .time-display {
      font-size: clamp(3rem, 5vw, 4.5rem);
      font-weight: 300;
      line-height: 1;
      letter-spacing: -0.04em;
      margin-bottom: 8px;
      background: linear-gradient(to bottom right, #ffffff, #8a8a93);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero .date-display {
      font-size: clamp(1.1rem, 1.5vw, 1.4rem);
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: auto;
    }

    .hero .greeting {
      font-size: 1.8rem;
      font-weight: 600;
      margin-top: 40px;
    }

    .hero .subtitle {
      color: var(--text-muted);
      font-size: 0.85rem;
      font-family: 'JetBrains Mono', monospace;
      margin-top: 8px;
    }

    /* Service Cards (Span 7 / 2 = 3.5 roughly ~ let's use auto-fill naturally) */
    .service-card {
      /* Let the grid auto-flow manage non-hero cards dynamically, but suggest a min width */
      grid-column: span 3;
      justify-content: space-between;
      border-radius: var(--radius-md);
      cursor: pointer;
    }

    .service-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
    }

    .service-header h2 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin: 0;
    }

    /* The pulsing dot status */
    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background-color: var(--status-check);
      box-shadow: 0 0 12px var(--status-check);
      position: relative;
      margin-top: 6px;
      transition: background-color 0.3s, box-shadow 0.3s;
    }

    .status-dot::after {
      content: "";
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1px solid var(--status-check);
      opacity: 0;
      animation: pulse 2s infinite cubic-bezier(0.4, 0, 0.6, 1);
    }

    .status-dot.ok {
      background-color: var(--status-ok);
      box-shadow: 0 0 12px var(--status-ok);
    }

    .status-dot.ok::after {
      border-color: var(--status-ok);
    }

    .status-dot.bad {
      background-color: var(--status-bad);
      box-shadow: 0 0 12px var(--status-bad);
      animation: none;
    }

    .status-dot.bad::after {
      display: none;
    }

    @keyframes pulse {
      0% {
        transform: scale(0.8);
        opacity: 0.8;
      }

      100% {
        transform: scale(2.5);
        opacity: 0;
      }
    }

    .service-desc {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 24px;
    }

    .service-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
    }

    .service-path {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: var(--text-muted);
      background: rgba(255, 255, 255, 0.03);
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* Subtle Copy Icon */
    .copy-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }

    .copy-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-main);
    }

    .copy-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    /* Responsive */
    @media (max-width: 1400px) {
      .hero {
        grid-column: span 12;
        grid-row: span 1;
        padding: 24px;
      }

      .hero .time-display {
        font-size: 3rem;
      }

      .service-card {
        grid-column: span 4;
      }
    }

    @media (max-width: 900px) {
      .service-card {
        grid-column: span 6;
      }
    }

    @media (max-width: 600px) {
      .service-card {
        grid-column: span 12;
      }

      body {
        padding: 16px;
      }

      .glass-panel {
        padding: 24px;
      }
    }

    /* Fallback clipboard element */
    .clipboard-zero {
      position: absolute;
      left: -9999px;
      top: -9999px;
      opacity: 0;
    }
  </style>
</head>

<body>

  <div class="ambient-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <main class="bento-container" id="bento-grid">
    <!-- Hero Block -->
    <div class="glass-panel hero">
      <div class="time-display" id="time">00:00</div>
      <div class="date-display" id="date">Loading...</div>

      <div class="greeting" id="greeting">Hello, Operator.</div>
      <div class="subtitle">System entry :: :8080 // Secure environment</div>
    </div>

    <!-- Service Cards Injected via JS -->
  </main>

  <textarea id="clipboard-fb" class="clipboard-zero"></textarea>

  <script>
    const services = [
      { id: 'mcs', name: 'MCSManager', path: '/mcs/', desc: 'Minecraft service management panel. Server orchestrator.' },
      { id: 'asf', name: 'ArchiSteamFarm', path: '/asf/', desc: 'ASF web interface and bot runtime. Steam automation.' },
      { id: 'aria2', name: 'AriaNg', path: '/aria2/', desc: 'Aria2 web UI through Caddy route. High-speed downloader.' },
      { id: 'transmission', name: 'Transmission', path: '/transmission/', desc: 'BitTorrent dashboard with watch-dir and long-running queue control.', probe: false, statusLabel: 'Auth required' },
      { id: 'syncthing', name: 'Syncthing', path: '/syncthing/', desc: 'Peer-to-peer file sync console behind Caddy. Decentralized storage.' },
      { id: 'files', name: 'Files', path: '/files/', desc: 'Unified file panel for aria2, Transmission, Syncthing, and Termux Home.' },
      { id: 'smart-direct', name: 'Smart Direct', path: '/smart-direct.html?path=/files/files/downloads/aria2/', desc: 'Auto-pick the fastest reachable local address, then open the unified file service in aria2 downloads.', probe: false, statusLabel: 'Smart route' },
      { id: 'jsonrpc', name: 'Aria2 RPC', path: '/jsonrpc', desc: 'API endpoint for download automation. Core system loop.' },
      { id: 'ha', name: 'Home Assistant', path: ':8123/', desc: 'Home automation dashboard (uv-managed runtime). Local IoT hub.', isAbsolute: true }
    ];

    const container = document.getElementById('bento-grid');
    const haUrl = `${location.protocol}//${location.hostname}:8123/`;

    // SVG Icons
    const copyIcon = `<svg viewBox="0 0 24 24"><path d="M16 1H4C2.9 1 2 1.9 2 3v14h2V3h12V1zm3 4H8C6.9 5 6 5.9 6 7v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>`;
    const checkIcon = `<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>`;

    services.forEach(svc => {
      const isHa = svc.id === 'ha';
      const url = isHa ? haUrl : svc.path;
      const displayPath = isHa ? `${location.hostname}:8123/` : svc.path;
      const healthEndpoint = isHa ? null : svc.path;

      // Create main anchor tag directly so the whole card is clickable
      const card = document.createElement('a');
      card.className = 'glass-panel service-card';
      card.href = url;
      if (isHa) card.target = '_blank';
      card.rel = 'noopener';

      card.innerHTML = `
        <div>
          <div class="service-header">
            <h2>${svc.name}</h2>
            <div class="status-dot" id="dot-${svc.id}" title="Checking status..."></div>
          </div>
          <div class="service-desc">${svc.desc}</div>
        </div>
        <div class="service-footer">
          <div class="service-path">${displayPath}</div>
          <button class="copy-btn" data-url="${url}" title="Copy Link" aria-label="Copy Link">
            ${copyIcon}
          </button>
        </div>
      `;

      // Glow tracking
      card.addEventListener('mousemove', e => {
        const rect = card.getBoundingClientRect();
        card.style.setProperty('--mouse-x', `${e.clientX - rect.left}px`);
        card.style.setProperty('--mouse-y', `${e.clientY - rect.top}px`);
      });

      // Prevent link navigation when clicking copy button
      const copyBtn = card.querySelector('.copy-btn');
      copyBtn.addEventListener('click', async (e) => {
        e.preventDefault();
        e.stopPropagation(); // Stops card from navigating

        const fullUrl = new URL(url, window.location.href).href;
        let success = false;

        if (navigator.clipboard && window.isSecureContext) {
          try { await navigator.clipboard.writeText(fullUrl); success = true; }
          catch (err) { console.warn('API fail'); }
        }

        if (!success) {
          try {
            const fb = document.getElementById('clipboard-fb');
            fb.value = fullUrl; fb.select(); fb.setSelectionRange(0, 99999);
            document.execCommand('copy');
            success = true;
          } catch (err) { console.error('Fallback fail'); }
        }

        if (success) {
          copyBtn.innerHTML = checkIcon;
          copyBtn.style.color = 'var(--status-ok)';
          setTimeout(() => {
            copyBtn.innerHTML = copyIcon;
            copyBtn.style.color = '';
          }, 2000);
        }
      });

      container.appendChild(card);

      // Probing logic
      if (svc.probe === false) {
        const dot = document.getElementById(`dot-${svc.id}`);
        dot.title = svc.statusLabel || "Protected endpoint";
        dot.style.backgroundColor = "var(--text-muted)";
        dot.style.boxShadow = "none";
        dot.style.animation = "none";
      } else if (healthEndpoint) {
        probeStatus(healthEndpoint, svc.id);
        setInterval(() => probeStatus(healthEndpoint, svc.id), 15000);
      } else {
        const dot = document.getElementById(`dot-${svc.id}`);
        dot.title = "Manual startup required";
        dot.style.backgroundColor = "var(--text-muted)";
        dot.style.boxShadow = "none";
        dot.style.animation = "none";
      }
    });

    async function probeStatus(url, id) {
      const dot = document.getElementById(`dot-${id}`);
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 4000);
        const res = await fetch(url, { method: "GET", cache: "no-store", signal: controller.signal });
        clearTimeout(timeoutId);

        if ([200, 301, 302, 307, 308, 401, 403, 405].includes(res.status)) {
          dot.className = "status-dot ok";
          dot.title = "Online";
        } else {
          dot.className = "status-dot bad";
          dot.title = "Error " + res.status;
        }
      } catch (err) {
        dot.className = "status-dot bad";
        dot.title = "Offline";
      }
    }

    // Time handling
    function updateClock() {
      const now = new Date();
      const h = now.getHours();
      let greet = "Good evening.";
      if (h >= 5 && h < 12) greet = "Good morning.";
      else if (h >= 12 && h < 18) greet = "Good afternoon.";

      document.getElementById('greeting').textContent = greet;
      document.getElementById('time').textContent = now.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', hour12: false });

      const dateOpts = { weekday: 'long', month: 'long', day: 'numeric' };
      document.getElementById('date').textContent = now.toLocaleDateString(undefined, dateOpts);
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>

</html>
